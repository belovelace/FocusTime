<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet">
  <title>Home - FocusTime</title>
</head>
<body class="bg-background text-on-surface min-h-screen p-6">
  <header class="max-w-3xl mx-auto mb-6 flex justify-between items-center">
    <h1 class="text-2xl font-bold">FocusTime</h1>
    <a href="/app/profile.html" class="text-sm text-indigo-600">프로필</a>
  </header>
  <main class="max-w-3xl mx-auto bg-white p-6 rounded-xl shadow">
    <h2 class="font-semibold mb-3">새 세션 만들기</h2>
    <label class="block text-sm">길이</label>
    <select id="duration" class="w-40 p-2 border rounded mb-3"><option value="25">25분</option><option value="50">50분</option><option value="75">75분</option></select>
    <label class="block text-sm">포커스 모드</label>
    <select id="focusMode" class="w-40 p-2 border rounded mb-4"><option value="any">any</option><option value="desk">desk</option><option value="moving">moving</option></select>
    <button id="createBtn" class="px-4 py-2 bg-indigo-600 text-white rounded">세션 만들기</button>
  </main>

  <script src="/app/js/api.js"></script>
  <script>
    (function(){
      const btn = document.getElementById('createBtn');
      btn.addEventListener('click', async ()=>{
        const duration = Number(document.getElementById('duration').value);
        const mode = document.getElementById('focusMode').value;
        if (!['desk','moving','any'].includes(mode)){ alert('focusMode invalid'); return; }
        const res = await FTApi.createSession({ startsAt: new Date().toISOString(), durationMin: duration, focusMode: mode });
        if (res.ok && res.body && res.body.id){ FTApi.setSessionId(String(res.body.id)); window.location.href = '/app/session.html'; }
        else alert('세션 생성 실패');
      });
    })();
  </script>
</body>
</html>
