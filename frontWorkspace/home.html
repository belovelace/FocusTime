<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
  <title>FocusTime — 홈</title>
</head>
<body class="bg-background text-on-surface antialiased selection:bg-primary/30">
  <header class="sticky top-0 z-50 bg-white/60 backdrop-blur-sm">
    <nav class="max-w-5xl mx-auto px-6 py-3 flex items-center justify-between">
      <div class="text-xl font-bold text-primary">포커스타임</div>
      <div class="hidden md:flex items-center gap-6">
        <a href="#" class="text-sm text-on-surface-variant hover:text-primary">서비스 소개</a>
        <a href="#" class="text-sm text-on-surface-variant hover:text-primary">요금제</a>
        <a href="#" class="text-sm text-on-surface-variant hover:text-primary">이용 후기</a>
      </div>
      <div class="flex items-center gap-3">
        <a href="/app/login.html" class="text-sm text-primary font-semibold">로그인</a>
        <a href="/app/signup.html" class="px-3 py-2 rounded-lg" style="background:#3B5BDB;color:#fff;">무료로 시작하기</a>
      </div>
    </nav>
  </header>

  <main class="max-w-5xl mx-auto px-6">
    <!-- Hero -->
    <section class="grid md:grid-cols-2 gap-12 items-center py-24">
      <div class="space-y-6">
        <div class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-primary/10 text-primary text-xs font-bold tracking-widest uppercase">Virtual Co-working</div>
        <h1 class="text-4xl md:text-6xl font-extrabold leading-tight">함께 집중할 때, 더 잘 됩니다</h1>
        <p class="text-lg text-on-surface-variant max-w-lg">파트너와 함께 25분, 지금 바로 시작하세요 — 조용하고 집중된 환경에서 목표를 달성합니다.</p>
        <div class="flex gap-4 pt-4">
          <a href="/app/signup.html" class="px-6 py-3 rounded-xl font-bold shadow" style="background:#3B5BDB;color:#fff;">무료로 시작하기</a>
          <a href="/app/login.html" class="px-6 py-3 rounded-xl font-bold shadow" style="background:#3B5BDB;color:#fff;">로그인</a>
        </div>
      </div>
      <div class="rounded-2xl overflow-hidden shadow-2xl bg-surface p-4">
        <img src="/images/img/home_screen.png" alt="앱 목업" class="w-full h-full object-cover rounded-xl"/>
      </div>
    </section>

    <!-- Stats -->
    <section class="bg-primary text-white rounded-xl p-8 mb-12">
      <div class="max-w-5xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-6 text-center">
        <div>
          <p class="text-2xl font-bold">12만+</p>
          <p class="text-sm opacity-90">완료된 세션</p>
        </div>
        <div>
          <p class="text-2xl font-bold">500만+</p>
          <p class="text-sm opacity-90">총 집중 시간(분)</p>
        </div>
        <div>
          <p class="text-2xl font-bold">5만+</p>
          <p class="text-sm opacity-90">가입 회원</p>
        </div>
      </div>
    </section>

    <!-- Quick create (click the card or the button to create a session) -->
    <section id="quickCreateCard" class="bg-surface rounded-xl p-8 shadow mb-12">
      <div class="flex flex-col md:flex-row md:items-center gap-4">
        <div class="flex-1">
          <label class="block text-sm mb-2">세션 길이</label>
          <select id="duration" class="w-40 p-3 rounded-lg bg-surface-container-high">
            <option value="25">25분</option>
            <option value="50">50분</option>
            <option value="75">75분</option>
          </select>
        </div>
        <div class="flex-1">
          <label class="block text-sm mb-2">포커스 모드</label>
          <select id="focusMode" class="w-40 p-3 rounded-lg bg-surface-container-high">
            <option value="any">선택</option>
            <option value="desk">데스크</option>
            <option value="moving">이동 중</option>
          </select>
        </div>
        <div>
          <button id="createBtn" class="px-6 py-3 rounded-lg font-semibold" style="background:#3B5BDB;color:#fff;">세션 만들기</button>
        </div>
      </div>
    </section>

  </main>

  <script src="/app/js/api.js"></script>
  <script>
    (function(){
      const createBtn = document.getElementById('createBtn');

      async function doCreate(duration, mode){
        createBtn.disabled = true;
        try{
          const res = await FTApi.createSession({ startsAt: new Date().toISOString(), durationMin: duration, focusMode: mode });
          if (res && res.ok && res.body && res.body.id){
            const id = res.body.id;
            FTApi.setSessionId(String(id));
            window.location.href = `/app/session.html?id=${encodeURIComponent(String(id))}`;
            return true;
          }
          if (res && res.status === 401){
            const next = `/app/home.html?create=1&duration=${encodeURIComponent(duration)}&mode=${encodeURIComponent(mode)}`;
            window.location.href = `/app/login.html?next=${encodeURIComponent(next)}`;
            return false;
          }
          alert('세션 생성에 실패했습니다. 로그인 상태인지 확인하세요.');
          return false;
        }catch(e){
          if (e.message === 'unauthenticated') return false;
          console.error(e);
          alert('서버 오류가 발생했습니다');
          return false;
        } finally{ createBtn.disabled = false; }
      }

      createBtn.addEventListener('click', async ()=>{
        const duration = Number(document.getElementById('duration').value);
        const mode = document.getElementById('focusMode').value;
        if (!FTApi.getToken()){
          const next = `/app/home.html?create=1&duration=${encodeURIComponent(duration)}&mode=${encodeURIComponent(mode)}`;
          window.location.href = `/app/login.html?next=${encodeURIComponent(next)}`;
          return;
        }
        await doCreate(duration, mode);
      });

      // make the whole card clickable (except when clicking inputs or buttons)
      const card = document.getElementById('quickCreateCard');
      if (card) card.addEventListener('click', (e)=>{
        if (e.target.closest('input,select,button,a,label')) return;
        document.getElementById('createBtn').click();
      });

      // Auto-create flow when coming back from login with ?create=1
      (async function autoCreateFromParams(){
        try{
          const params = new URLSearchParams(location.search);
          if (params.get('create') === '1'){
            const duration = Number(params.get('duration') || document.getElementById('duration').value);
            const mode = params.get('mode') || document.getElementById('focusMode').value;
            if (!FTApi.getToken()){
              const next = `/app/home.html?create=1&duration=${encodeURIComponent(duration)}&mode=${encodeURIComponent(mode)}`;
              window.location.href = `/app/login.html?next=${encodeURIComponent(next)}`;
              return;
            }
            history.replaceState({}, '', location.pathname);
            await doCreate(duration, mode);
          }
        }catch(e){ console.error(e); }
      })();

    })();
  </script>
</body>
</html>
