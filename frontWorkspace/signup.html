<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet">
  <title>Sign Up - FocusTime</title>
</head>
<body class="bg-background text-on-surface min-h-screen flex items-center justify-center">
  <main class="w-full max-w-md p-6 bg-white rounded-xl shadow-lg">
    <h1 class="text-2xl font-bold mb-4">회원가입</h1>
    <label class="block text-sm font-medium">이메일</label>
    <input id="email" type="email" class="w-full p-3 rounded-md border mt-1 mb-3" />
    <label class="block text-sm font-medium">비밀번호</label>
    <input id="password" type="password" class="w-full p-3 rounded-md border mt-1 mb-3" />
    <label class="block text-sm font-medium">비밀번호 확인</label>
    <input id="password2" type="password" class="w-full p-3 rounded-md border mt-1 mb-4" />
    <button id="signupBtn" class="w-full py-3 bg-indigo-600 text-white rounded-md">회원가입</button>
    <p class="mt-4 text-sm">이미 계정이 있나요? <a href="/app/login.html" class="text-indigo-600 font-bold">로그인</a></p>
  </main>

  <script src="/app/js/api.js"></script>
  <script>
    (function(){
      const email = document.getElementById('email');
      const password = document.getElementById('password');
      const password2 = document.getElementById('password2');
      const btn = document.getElementById('signupBtn');
      console.log('signup inputs', email, password, password2);
      btn.addEventListener('click', async ()=>{
        const em = email.value.trim(); const pw = password.value; const pw2 = password2.value;
        if (!em || !pw || pw.length < 8 || pw !== pw2){ alert('필드를 확인하세요'); return; }
        try {
          const res = await FTApi.signup({ email: em, password: pw, nickname: em.split('@')[0], timezone: 'Asia/Seoul' });
          if (res.ok && res.body && res.body.accessToken){ FTApi.setToken(res.body.accessToken); window.location.href = '/app/home.html'; return; }
          // fallback to login attempt
          const lg = await FTApi.login(em, pw);
          if (lg.ok && lg.body && lg.body.accessToken){ FTApi.setToken(lg.body.accessToken); window.location.href = '/app/home.html'; return; }
          alert('회원가입 실패');
        } catch(e){ alert('회원가입 중 오류'); }
      });
    })();
  </script>
</body>
</html>
