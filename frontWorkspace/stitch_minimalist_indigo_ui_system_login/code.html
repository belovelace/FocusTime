<!DOCTYPE html>

<html lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link as="style" crossorigin="" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, 'Helvetica Neue', 'Segoe UI', 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', 'Apple Color Emoji', 'Segoe UI Emoji', 'Segoe UI Symbol', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                "on-primary-container": "#e2e5ff",
                "on-primary": "#ffffff",
                "surface-container-low": "#f3f4f5",
                "secondary-container": "#8af791",
                "surface-variant": "#e1e3e4",
                "on-secondary": "#ffffff",
                "tertiary-container": "#006da4",
                "on-tertiary-fixed": "#001e31",
                "surface-tint": "#3052d2",
                "surface-bright": "#f8f9fa",
                "on-error-container": "#93000a",
                "surface": "#f8f9fa",
                "inverse-surface": "#2e3132",
                "background": "#f8f9fa",
                "surface-dim": "#d9dadb",
                "primary-container": "#3b5bdb",
                "error-container": "#ffdad6",
                "on-secondary-container": "#007326",
                "on-error": "#ffffff",
                "secondary-fixed": "#8dfa94",
                "outline": "#747686",
                "secondary-fixed-dim": "#71dd7a",
                "secondary": "#006e24",
                "primary": "#1a40c2",
                "surface-container-lowest": "#ffffff",
                "primary-fixed-dim": "#b8c3ff",
                "on-primary-fixed": "#001355",
                "tertiary-fixed-dim": "#91cdff",
                "inverse-on-surface": "#f0f1f2",
                "inverse-primary": "#b8c3ff",
                "on-secondary-fixed-variant": "#005319",
                "on-tertiary": "#ffffff",
                "error": "#ba1a1a",
                "on-background": "#191c1d",
                "on-tertiary-container": "#d4e9ff",
                "on-surface-variant": "#444654",
                "surface-container": "#edeeef",
                "tertiary": "#00547f",
                "outline-variant": "#c4c5d6",
                "surface-container-high": "#e7e8e9",
                "primary-fixed": "#dde1ff",
                "on-secondary-fixed": "#002106",
                "on-primary-fixed-variant": "#0736ba",
                "tertiary-fixed": "#cce5ff",
                "surface-container-highest": "#e1e3e4",
                "on-tertiary-fixed-variant": "#004b72",
                "on-surface": "#191c1d"
              },
              "borderRadius": {
                "DEFAULT": "0.25rem",
                "lg": "0.5rem",
                "xl": "0.75rem",
                "full": "9999px"
              },
              "fontFamily": {
                "headline": ["Pretendard"],
                "body": ["Pretendard"],
                "label": ["Pretendard"]
              }
            },
          },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface antialiased min-h-screen flex flex-col">
<!-- TopAppBar from JSON Anchors -->
<!-- Executing style_shell_layout and style_bg_color directly -->
<header class="fixed top-0 left-0 w-full z-50 flex items-center justify-between px-4 py-3 bg-[#F8F9FA] dark:bg-slate-950 no-border">
<button class="p-2 transition-all duration-100 ease-in-out active:scale-95 hover:bg-slate-200/50 dark:hover:bg-slate-800/50 rounded-lg">
<span class="material-symbols-outlined text-on-surface" data-icon="arrow_back">arrow_back</span>
</button>
<!-- JSON Headline Casing Integrity -->
<h1 class="text-xl font-black text-[#3B5BDB] dark:text-indigo-400 font-pretendard tracking-tight">포커스타임</h1>
<div class="w-10"></div> <!-- Spacer for centering -->
</header>
<!-- Main Canvas -->
<main class="flex-1 flex flex-col pt-20 pb-12 px-6 max-w-md mx-auto w-full">
<!-- Header Text -->
<div class="mt-8 mb-10 text-center">
<h2 class="text-3xl font-extrabold tracking-tight text-on-surface">로그인</h2>
<p class="mt-2 text-on-surface-variant body-md opacity-80">다시 집중의 시간으로 돌아올 시간입니다</p>
</div>
<!-- Input Fields Group -->
<div class="space-y-4">
<div class="space-y-2">
<label class="text-sm font-bold tracking-widest text-on-surface-variant uppercase ml-1">이메일 주소</label>
<input class="w-full h-14 px-4 bg-surface-container-high border-none rounded-xl focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-lowest transition-all duration-200 outline-none text-on-surface" placeholder="email@example.com" type="email"/>
</div>
<div class="space-y-2">
<label class="text-sm font-bold tracking-widest text-on-surface-variant uppercase ml-1">비밀번호</label>
<div class="relative">
<input class="w-full h-14 px-4 bg-surface-container-high border-none rounded-xl focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-lowest transition-all duration-200 outline-none text-on-surface" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<div class="flex justify-end">
<a class="text-sm font-medium text-primary hover:underline decoration-primary/30 underline-offset-4" href="#">비밀번호를 잊으셨나요?</a>
</div>
</div>
<!-- Primary CTA with Glass & Gradient -->
<div class="mt-8">
<button class="w-full h-14 bg-gradient-to-r from-[#1a40c2] to-[#3b5bdb] text-white font-bold rounded-xl shadow-lg shadow-primary/10 transition-all duration-100 ease-in-out active:scale-[0.98] hover:brightness-110">
                로그인
            </button>
</div>
<!-- Divider Logic -->
<div class="my-8 flex items-center gap-4">
<div class="h-[1px] flex-1 bg-surface-variant/50"></div>
<span class="text-xs font-bold text-outline-variant uppercase tracking-widest">또는</span>
<div class="h-[1px] flex-1 bg-surface-variant/50"></div>
</div>
<!-- Social Logins -->
<div class="space-y-3">
<button class="w-full h-14 bg-[#FEE500] text-[#191919] font-bold rounded-xl flex items-center justify-center gap-3 transition-all duration-100 ease-in-out active:scale-[0.98]">
<!-- Hypothetical Kakao Icon mapping -->
<span class="material-symbols-outlined text-xl" data-icon="chat_bubble" style="font-variation-settings: 'FILL' 1;">chat_bubble</span>
                카카오로 시작하기
            </button>
<button class="w-full h-14 bg-surface-container-lowest text-on-surface font-bold rounded-xl flex items-center justify-center gap-3 transition-all duration-100 ease-in-out active:scale-[0.98] shadow-sm">
<span class="material-symbols-outlined text-xl" data-icon="mail">mail</span>
                Google로 로그인
            </button>
</div>
<!-- Footer Link -->
<div class="mt-auto pt-10 text-center">
<p class="text-on-surface-variant font-medium">
                아직 계정이 없으신가요? 
                <a class="ml-1 text-primary font-bold hover:underline decoration-primary/30 underline-offset-4" href="#">회원가입</a>
</p>
</div>
<!-- Ambient Decoration (No-line rule) -->
<div class="absolute top-1/4 -right-20 w-64 h-64 bg-primary/5 rounded-full blur-[80px] -z-10"></div>
<div class="absolute bottom-0 -left-20 w-80 h-80 bg-secondary/5 rounded-full blur-[100px] -z-10"></div>
</main>
<!-- Shell Suppression: Login screen is transactional/linear, BottomNavBar is excluded per requirements -->

<script src="/app/js/api.js"></script>
<script>
  (function(){
    const main = document.querySelector('main');
    const email = main.querySelector('input[type="email"]');
    const pass = main.querySelector('input[type="password"]');
    const btn = main.querySelector('button');
    btn.addEventListener('click', async (e)=>{
      e.preventDefault();
      const res = await FTApi.login(email.value.trim(), pass.value);
      if (res.ok && res.body && res.body.accessToken){ FTApi.setToken(res.body.accessToken); window.location.href = '/app/stitch_minimalist_indigo_ui_system_home/code.html'; return; }
      alert('로그인 실패');
    });
  })();
</script>
</body></html>
