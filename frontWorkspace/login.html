<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet">
  <title>Login - FocusTime</title>
</head>
<body class="bg-background text-on-surface min-h-screen flex items-center justify-center">
  <main class="w-full max-w-md p-6 bg-white rounded-xl shadow-lg">
    <h1 class="text-2xl font-bold mb-4">로그인</h1>
    <label class="block text-sm font-medium">이메일</label>
    <input id="email" type="email" class="w-full p-3 rounded-md border mt-1 mb-3" />
    <label class="block text-sm font-medium">비밀번호</label>
    <input id="password" type="password" class="w-full p-3 rounded-md border mt-1 mb-4" />
    <button id="loginBtn" class="w-full py-3 bg-indigo-600 text-white rounded-md">로그인</button>
    <p class="mt-4 text-sm">계정이 없나요? <a href="/app/signup.html" class="text-indigo-600 font-bold">회원가입</a></p>
  </main>

  <script src="/app/js/api.js"></script>
  <script>
    (function(){
      const email = document.getElementById('email');
      const password = document.getElementById('password');
      const btn = document.getElementById('loginBtn');
      console.log('login inputs', email, password);
      btn.addEventListener('click', async () => {
        const em = email.value.trim(); const pw = password.value;
        if (!em || !pw) { alert('이메일과 비밀번호를 입력하세요'); return; }
        try {
          const res = await FTApi.login(em, pw);
          if (res.ok && res.body && res.body.accessToken){ FTApi.setToken(res.body.accessToken); window.location.href = '/app/home.html'; return; }
          alert('로그인 실패');
        } catch(e){ alert('로그인 중 오류'); }
      });
    })();
  </script>
</body>
</html>
