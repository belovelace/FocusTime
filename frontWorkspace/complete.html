<!doctype html>
<html lang="ko"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script><link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet"><title>Complete</title></head><body class="bg-background text-on-surface min-h-screen p-6"><main class="max-w-3xl mx-auto bg-white p-6 rounded-xl shadow"><h1 class="text-xl font-bold mb-3">세션 완료</h1><textarea id="resultText" class="w-full h-24 p-3 border rounded mb-3" placeholder="오늘의 성취를 적어보세요"></textarea><div class="mb-3">별점</div><select id="rating" class="p-2 border rounded mb-3"><option value="">선택</option><option>1</option><option>2</option><option>3</option><option>4</option><option>5</option></select><button id="submitComplete" class="px-3 py-2 bg-indigo-600 text-white rounded">저장 및 홈으로</button></main><script src="/app/js/api.js"></script><script>(function(){const sessionId=FTApi.getSessionId(); if(!sessionId){ alert('No session'); location.href='/app/home.html'; } document.getElementById('submitComplete').addEventListener('click', async ()=>{ const text=document.getElementById('resultText').value.trim(); const rating=document.getElementById('rating').value; const res = await FTApi.postGoal(sessionId, text); if(res.ok){ alert('저장됨'); FTApi.setSessionId(null); location.href='/app/home.html'; } else alert('저장 실패'); });})();</script></body></html>
