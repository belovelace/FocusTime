<style>
  * { font-family: 'Pretendard', 'Apple SD Gothic Neo', sans-serif; -webkit-font-smoothing: antialiased; }

  .material-symbols-outlined {
    font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
  }
  ::-webkit-scrollbar { display: none; }

  /* ── CTA Button ── */
  .btn-cta {
    background: linear-gradient(135deg, #1a40c2 0%, #3b5bdb 100%);
    transition: opacity 150ms ease-in-out, transform 100ms ease-in-out;
    box-shadow: 0 4px 16px rgba(58,91,219,0.22);
  }
  .btn-cta:hover { opacity: 0.93; }
  .btn-cta:active { transform: scale(0.97); opacity: 0.88; }

  /* ── Duration pills ── */
  .duration-pill {
    transition: background 140ms ease-in-out, color 140ms ease-in-out, box-shadow 140ms ease-in-out;
    border: 1.5px solid transparent;
  }
  .duration-pill.active {
    background: #3b5bdb;
    color: #e2e5ff;
    box-shadow: 0 3px 14px rgba(58,90,219,0.22);
    border-color: transparent;
  }
  .duration-pill:not(.active) {
    background: #ffffff;
    color: #747686;
    border-color: rgba(196,197,214,0.6);
  }
  .duration-pill:not(.active):hover { background: #f3f4f5; }

  /* ── Focus mode pills ── */
  .focus-mode-pill { transition: background 140ms ease, color 140ms ease, transform 100ms ease; }
  .focus-mode-pill:active { transform: scale(0.96); }

  /* ── Date chips ── */
  .date-chip { transition: background 140ms ease-in-out, color 140ms ease-in-out, box-shadow 140ms ease; }
  .date-chip.active {
    background: #1a40c2;
    color: #ffffff;
    box-shadow: 0 4px 12px rgba(26,64,194,0.22);
  }
  .date-chip:not(.active) { background: #ffffff; color: #444654; }
  .date-chip:not(.active):hover { background: #f3f4f5; }

  /* ── Favorites ── */
  .fav-card { transition: transform 150ms ease-in-out; cursor: pointer; }
  .fav-card:active { transform: scale(0.94); }

  /* ── Session cards ── */
  .session-card { transition: box-shadow 160ms ease, transform 160ms ease; }
  .session-card:hover { box-shadow: 0 6px 24px rgba(25,28,29,0.08) !important; transform: translateY(-1px); }

  /* ── Nav ── */
  .nav-item.active { color: #1a40c2; background: rgba(58,91,219,0.09); border-radius: 0.75rem; }
  .nav-item { transition: color 150ms ease-in-out, background 150ms ease-in-out; }

  /* ── Input fields ── */
  input[type="time"], input[type="text"] {
    transition: background 120ms ease, box-shadow 120ms ease;
    outline: none;
  }
  input[type="time"]:focus, input[type="text"]:focus {
    background: #ffffff !important;
    box-shadow: 0 0 0 2px rgba(26,64,194,0.18);
  }

  /* ── Progress bar ── */
  @keyframes progressIn {
    from { width: 0%; }
    to { width: var(--progress-width, 50%); }
  }
  .progress-bar { animation: progressIn 1s cubic-bezier(0.34, 1.56, 0.64, 1) 0.3s both; }

  /* ── Stagger fade-up ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .fade-up   { animation: fadeUp 0.42s cubic-bezier(.22,1,.36,1) both; }
  .fade-up-1 { animation-delay: 0.04s; }
  .fade-up-2 { animation-delay: 0.10s; }
  .fade-up-3 { animation-delay: 0.17s; }
  .fade-up-4 { animation-delay: 0.24s; }
  .fade-up-5 { animation-delay: 0.31s; }

  /* ── Toast ── */
  #toast {
    position: fixed; bottom: 96px; left: 50%;
    transform: translateX(-50%) translateY(12px);
    background: #191c1d; color: #f0f1f2;
    padding: 10px 20px; border-radius: 9999px;
    font-size: 13px; font-weight: 500;
    opacity: 0; transition: opacity 200ms ease, transform 200ms ease;
    pointer-events: none; white-space: nowrap; z-index: 200;
    box-shadow: 0 4px 20px rgba(0,0,0,0.18);
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ── Section label ── */
  .section-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #747686;
  }

  /* ── Divider ── */
  .subtle-divider { height: 1px; background: rgba(196,197,214,0.18); }

  /* ── ghost-border ── */
  .ghost-border { border: 1px solid rgba(196,197,214,0.15); }

  /* ── Stats card: aurora + bubbles ── */
  @keyframes aurora1 {
    0%,100% { transform: translate(0,0) scale(1); opacity:.28; }
    33%      { transform: translate(18px,-12px) scale(1.12); opacity:.38; }
    66%      { transform: translate(-10px,16px) scale(0.92); opacity:.22; }
  }
  @keyframes aurora2 {
    0%,100% { transform: translate(0,0) scale(1); opacity:.20; }
    40%      { transform: translate(-20px,10px) scale(1.18); opacity:.32; }
    75%      { transform: translate(14px,-18px) scale(0.88); opacity:.16; }
  }
  @keyframes aurora3 {
    0%,100% { transform: translate(0,0) scale(1); opacity:.14; }
    50%      { transform: translate(22px,8px) scale(1.1); opacity:.24; }
  }
  @keyframes bubbleRise {
    0%   { transform: translateY(0) scale(1); opacity:.55; }
    80%  { opacity:.30; }
    100% { transform: translateY(-110px) scale(.7); opacity:0; }
  }
  .stats-aurora { position:absolute; inset:0; overflow:hidden; pointer-events:none; border-radius:inherit; }
  .aurora-blob {
    position:absolute; border-radius:50%; filter:blur(32px);
    will-change: transform;
  }
  .aurora-blob-1 {
    width:160px; height:100px; background:rgba(139,250,148,0.30);
    top:-20px; right:-20px;
    animation: aurora1 7s ease-in-out infinite;
  }
  .aurora-blob-2 {
    width:130px; height:130px; background:rgba(184,195,255,0.22);
    bottom:-30px; left:-10px;
    animation: aurora2 9s ease-in-out infinite;
  }
  .aurora-blob-3 {
    width:100px; height:80px; background:rgba(91,150,255,0.18);
    top:30%; right:20%;
    animation: aurora3 11s ease-in-out infinite;
  }
  .bubble {
    position:absolute; border-radius:50%;
    background:rgba(255,255,255,0.18);
    will-change:transform,opacity;
    animation: bubbleRise linear infinite;
  }

  /* ── iOS-style drum-roll picker ── */
  .drum-col {
    height:180px; overflow:hidden; position:relative; flex:1;
  }
  .drum-col::before, .drum-col::after {
    content:''; position:absolute; left:0; right:0; z-index:2; pointer-events:none;
  }
  .drum-col::before {
    top:0; height:64px;
    background:linear-gradient(to bottom, rgba(237,238,239,0.96) 0%, rgba(237,238,239,0) 100%);
  }
  .drum-col::after {
    bottom:0; height:64px;
    background:linear-gradient(to top, rgba(237,238,239,0.96) 0%, rgba(237,238,239,0) 100%);
  }
  .drum-list {
    list-style:none; margin:0; padding:0;
    display:flex; flex-direction:column; align-items:center;
    transition:transform .18s cubic-bezier(.22,1,.36,1);
    cursor:grab; user-select:none;
  }
  .drum-list.grabbing { cursor:grabbing; transition:none; }
  .drum-item {
    height:36px; display:flex; align-items:center; justify-content:center;
    font-size:16px; font-weight:500; color:#747686;
    transition: color .15s, font-size .15s, font-weight .15s;
    width:100%;
  }
  .drum-item.selected { color:#191c1d; font-size:18px; font-weight:700; }
  .drum-selector-line {
    position:absolute; left:8px; right:8px; height:36px; top:50%; transform:translateY(-50%);
    background:rgba(26,64,194,0.08); border-radius:10px; z-index:1; pointer-events:none;
  }
</style>
</head>

<!-- iOS drum-roll picker init -->
<script>
(function() {
  const ITEM_H = 36;
  const PADDING = 2; // top/bottom padding items (blank)

  function buildDrum(listEl, items, initialIndex) {
    listEl.innerHTML = '';
    // pad blank items top & bottom so selected sits in center
    for (let i = 0; i < PADDING; i++) {
      const li = document.createElement('li');
      li.className = 'drum-item';
      li.style.height = ITEM_H + 'px';
      listEl.appendChild(li);
    }
    items.forEach((v, i) => {
      const li = document.createElement('li');
      li.className = 'drum-item' + (i === initialIndex ? ' selected' : '');
      li.textContent = v;
      li.style.height = ITEM_H + 'px';
      listEl.appendChild(li);
    });
    for (let i = 0; i < PADDING; i++) {
      const li = document.createElement('li');
      li.className = 'drum-item';
      li.style.height = ITEM_H + 'px';
      listEl.appendChild(li);
    }
    setIndex(listEl, initialIndex, false);
  }

  function setIndex(listEl, idx, animate) {
    const offset = -(idx * ITEM_H);
    if (!animate) listEl.classList.add('grabbing');
    listEl.style.transform = 'translateY(' + offset + 'px)';
    if (!animate) requestAnimationFrame(() => listEl.classList.remove('grabbing'));

    // highlight selected
    const allItems = listEl.querySelectorAll('.drum-item');
    allItems.forEach((li, i) => {
      const realI = i - PADDING;
      li.classList.toggle('selected', realI === idx);
    });
  }

  function getIndex(listEl) {
    const t = listEl.style.transform;
    const m = t.match(/translateY\((-?\d+(?:\.\d+)?)px\)/);
    if (!m) return 0;
    return Math.round(-parseFloat(m[1]) / ITEM_H);
  }

  function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }

  function makeDraggable(listEl, count, onChange) {
    let startY = 0, startOffset = 0, isDragging = false;

    function onStart(y) {
      isDragging = true;
      startY = y;
      startOffset = getIndex(listEl) * ITEM_H;
      listEl.classList.add('grabbing');
    }
    function onMove(y) {
      if (!isDragging) return;
      const delta = startY - y;
      const raw = Math.round((startOffset + delta) / ITEM_H);
      const idx = clamp(raw, 0, count - 1);
      setIndex(listEl, idx, false);
    }
    function onEnd() {
      if (!isDragging) return;
      isDragging = false;
      listEl.classList.remove('grabbing');
      const idx = getIndex(listEl);
      const clamped = clamp(idx, 0, count - 1);
      setIndex(listEl, clamped, true);
      onChange(clamped);
    }

    listEl.addEventListener('mousedown',  e => onStart(e.clientY));
    window.addEventListener('mousemove',  e => { if (isDragging) onMove(e.clientY); });
    window.addEventListener('mouseup',    () => onEnd());

    listEl.addEventListener('touchstart', e => { e.preventDefault(); onStart(e.touches[0].clientY); }, { passive:false });
    listEl.addEventListener('touchmove',  e => { e.preventDefault(); onMove(e.touches[0].clientY); }, { passive:false });
    listEl.addEventListener('touchend',   () => onEnd());

    // scroll wheel
    listEl.parentElement.addEventListener('wheel', e => {
      e.preventDefault();
      const idx = clamp(getIndex(listEl) + (e.deltaY > 0 ? 1 : -1), 0, count - 1);
      setIndex(listEl, idx, true);
      onChange(idx);
    }, { passive: false });
  }

  function syncToTimeInput() {
    const hi = getIndex(document.getElementById('drumHourList'));
    const mi = getIndex(document.getElementById('drumMinuteList'));
    const h = String(hi).padStart(2, '0');
    const m = ['00','15','30','45'][mi] || '00';
    const el = document.getElementById('startTimeInput');
    if (el) el.value = h + ':' + m;
  }

  // Build hours 0–23
  const hours = Array.from({length:24}, (_, i) => String(i).padStart(2,'0') + '시');
  const mins  = ['00분', '15분', '30분', '45분'];

  // Default: nearest future 15-min
  const now = new Date();
  let defH = now.getHours();
  let defM = Math.ceil(now.getMinutes() / 15);
  if (defM >= 4) { defM = 0; defH = (defH + 1) % 24; }

  buildDrum(document.getElementById('drumHourList'), hours, defH);
  buildDrum(document.getElementById('drumMinuteList'), mins, defM);
  syncToTimeInput();

  makeDraggable(document.getElementById('drumHourList'), hours.length, () => syncToTimeInput());
  makeDraggable(document.getElementById('drumMinuteList'), mins.length, () => syncToTimeInput());

  // expose helper for the main script's roundToQuarter override
  window._drumSetTime = function(h, m) {
    const mi = ['00','15','30','45'].indexOf(String(m).padStart(2,'0'));
    setIndex(document.getElementById('drumHourList'), clamp(h, 0, 23), true);
    setIndex(document.getElementById('drumMinuteList'), clamp(mi < 0 ? 0 : mi, 0, 3), true);
    syncToTimeInput();
  };
})();
</script>

<script>
(async function () {
  /* small helpers */
  function showToast(msg) { const t = document.getElementById('toast'); if(!t) return; t.textContent = msg; t.classList.add('show'); clearTimeout(t._timer); t._timer = setTimeout(()=> t.classList.remove('show'), 2500); }
  function pad2(n){ return String(n).padStart(2,'0'); }
  function roundToQuarter(d){ const copy = new Date(d); copy.setSeconds(0,0); const m = copy.getMinutes(); const rounded = Math.ceil(m/15)*15; if (rounded === 60) { copy.setHours(copy.getHours()+1); copy.setMinutes(0); } else { copy.setMinutes(rounded); } return copy; }

  /* ── Date strip ── */
  const strip = document.getElementById('dateStrip');
  const days = ['일','월','화','수','목','금','토'];
  const today = new Date();
  for (let i = 0; i < 7; i++) {
    const d = new Date(today);
    d.setDate(today.getDate() + i);
    const btn = document.createElement('button');
    btn.className = 'date-chip flex-shrink-0 w-[60px] py-3.5 rounded-2xl flex flex-col items-center gap-1 transition-all duration-150' + (i === 0 ? ' active' : '');
    btn.dataset.date = d.toISOString();
    btn.innerHTML = `<span style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;opacity:.7">${i === 0 ? '오늘' : days[d.getDay()]}</span><span style="font-size:20px;font-weight:800;line-height:1.1">${d.getDate()}</span>`;
    btn.addEventListener('click', () => {
      document.querySelectorAll('.date-chip').forEach(c => c.classList.remove('active'));
      btn.classList.add('active');
      // if selected date is today, ensure time input is not in the past
      try{
        const selectedDateYMD = btn.dataset.date.split('T')[0];
        const todayYMD = (new Date()).toISOString().split('T')[0];
        const timeInput = document.getElementById('startTimeInput');
        if (selectedDateYMD === todayYMD && timeInput) {
          const nowNearest = roundToQuarter(new Date());
          const ti = pad2(nowNearest.getHours()) + ':' + pad2(nowNearest.getMinutes());
          if (!timeInput.value || timeInput.value < ti) timeInput.value = ti;
        }
      }catch(e){}
      // load sessions for selected date
      loadUpcomingForDate(d.toISOString());
    });
    strip.appendChild(btn);
  }

  /* set default time to nearest future 15-minute */
  const timeInput = document.getElementById('startTimeInput');
  if (timeInput) {
    const defaultTimeDate = roundToQuarter(new Date());
    timeInput.value = pad2(defaultTimeDate.getHours()) + ':' + pad2(defaultTimeDate.getMinutes());
  }

  /* ── Duration pills ── */
  let selectedDuration = 25;
  document.querySelectorAll('.duration-pill').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.duration-pill').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      selectedDuration = parseInt(btn.dataset.min, 10);
    });
  });

  /* ── Focus mode pills ── */
  let selectedMode = 'desk';
  document.querySelectorAll('.focus-mode-pill').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.focus-mode-pill').forEach(b => {
        b.style.background = '#f3f4f5';
        b.style.color = '#444654';
      });
      btn.style.background = '#dde1ff';
      btn.style.color = '#1a40c2';
      selectedMode = btn.dataset.mode;
    });
  });
  // init first (guarded)
  const _initialFocusBtn = document.querySelector(`.focus-mode-pill[data-mode="${selectedMode}"]`);
  if (_initialFocusBtn) { _initialFocusBtn.style.background = '#dde1ff'; _initialFocusBtn.style.color = '#1a40c2'; }

  // small placeholder avatar data URL (SVG)
  function placeholderAvatarDataUrl(initial) {
    const color = '#c4c5d6';
    const txt = encodeURIComponent(initial || 'U');
    return `data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='128' height='128'><rect width='100%' height='100%' fill='${color}'/><text x='50%' y='54%' font-size='64' text-anchor='middle' fill='%23ffffff' font-family='Arial,Helvetica,sans-serif'>${txt}</text></svg>`;
  }

  /* ── Create session ── */
  const createBtn = document.getElementById('createBtn');
  createBtn.addEventListener('click', async () => {
    const activeDateChip = document.querySelector('.date-chip.active');
    const dateYmd = activeDateChip ? activeDateChip.dataset.date.split('T')[0] : (new Date()).toISOString().split('T')[0];
    const timeVal = document.getElementById('startTimeInput')?.value || '00:00';
    const [hh, mm] = timeVal.split(':').map(v => parseInt(v,10));
    const [year, month, day] = dateYmd.split('-').map(v => parseInt(v,10));
    const startsDate = new Date(year, month - 1, day, hh || 0, mm || 0, 0, 0);
    const startsAt = startsDate.toISOString();

    createBtn.disabled = true;
    createBtn.textContent = '예약 중…';

    try {
      if (typeof FTApi === 'undefined') throw new Error('no-api');
      if (!FTApi.getToken()) {
        window.location.href = '/app/login.html?next=' + encodeURIComponent(window.location.pathname);
        return;
      }
      const goalText = (document.getElementById('sessionGoalInput')?.value || '').trim();
      const payload = { startsAt, durationMin: selectedDuration, focusMode: selectedMode };
      if (goalText) payload.goalText = goalText;
      const res = await FTApi.createSession(payload);
      if (res && res.ok && res.body) {
        // attach goalText locally so the newly created session shows it immediately
        const sess = Object.assign({}, res.body, { goalText });
        _renderedSessions.unshift(sess);
        renderSessionCards(_renderedSessions);
        showToast('세션이 예약되었습니다. 예정된 세션에서 참가할 수 있습니다.');
      } else {
        showToast('세션 생성에 실패했어요. 다시 시도해 주세요.');
      }
    } catch (e) {
      console.error(e);
      showToast('세션 생성에 실패했어요.');
    } finally {
      createBtn.disabled = false;
      createBtn.textContent = '세션 만들기';
    }
  });

  /* ── Load user info ── */
  async function loadUser() {
    try {
      if (typeof FTApi === 'undefined') return;
      const res = await FTApi.request('/api/users/me');
      if (res.ok) {
        const u = res.body;
        document.getElementById('userName').textContent = u.nickname || '사용자';
        if (u.avatarUrl) document.getElementById('userAvatar').src = u.avatarUrl;
        const ua = document.getElementById('userAvatar');
        ua.dataset.userId = u.id;
        ua.onerror = function(){ this.onerror=null; this.src = placeholderAvatarDataUrl((u.nickname||'')[0]); };
        // fill weekly stats if present
        function fmtMinutes(v){ if (v == null) return null; if (typeof v === 'number') { const h = Math.floor(v/60); const m = v%60; return (h? h + '시간 ':'') + (m? m + '분':'') || '0분'; } return String(v); }
        if (u.totalFocused != null) document.querySelector('[data-key="focusedWeek"]').textContent = fmtMinutes(u.totalFocused);
        if (u.completedSessions !== undefined) { const el = document.querySelector('[data-key="completedSessions"]'); const target = el ? el.querySelector('p.text-base') : null; if (target) target.textContent = String(u.completedSessions) + '회'; }
        if (u.weekGoal) document.querySelector('[data-key="weekGoal"]').textContent = '목표 ' + u.weekGoal;
      }
    } catch (_) {}
  }
  await loadUser();
  // load favorites
  async function loadFavorites(){
    const favRow = document.getElementById('favoritesRow');
    try{
      const res = await FTApi.getFavorites();
      const list = res && res.ok ? (res.body || res) : [];
      favRow.innerHTML = '';
      if (!list.length) { favRow.innerHTML = '<div class="text-sm text-gray-500">즐겨찾기가 없습니다.</div>'; return; }
      list.forEach(p=>{
        const el = document.createElement('div');
        el.className = 'fav-card flex-shrink-0 flex flex-col items-center gap-1.5';
        el.setAttribute('role','listitem');
        el.innerHTML = `
          <div class="relative">
            <div class="w-14 h-14 rounded-full overflow-hidden bg-surface-container-high flex items-center justify-center"
                 style="box-shadow:0 0 0 2px #fff,0 0 0 3.5px rgba(59,91,219,0.14)">
              <img src="${p.avatarUrl||''}" class="w-full h-full object-cover fav-avatar" alt="${p.nickname||p.email}"/>
            </div>
            <button class="fav-remove absolute -top-0.5 -right-0.5 w-5 h-5 bg-white rounded-full flex items-center justify-center text-[10px] font-bold transition-colors hover:bg-error hover:text-white" data-id="${p.id}" aria-label="즐겨찾기 제거" style="color:#ba1a1a;box-shadow:0 1px 6px rgba(0,0,0,0.12)">✕</button>
          </div>
          <span class="fav-name text-[11px] font-medium text-on-surface-variant">${p.nickname||p.email}</span>
        `;
        favRow.appendChild(el);
      });
      // avatar fallbacks
      document.querySelectorAll('.fav-avatar').forEach(img=> img.onerror = function(){ this.onerror=null; this.src = placeholderAvatarDataUrl((this.alt||'')[0]); });
    }catch(e){ console.error(e); favRow.innerHTML = '<div class="text-sm text-gray-500">불러오기 실패</div>'; }
  }
  await loadFavorites();
  // load today's upcoming sessions
  const firstChip = document.querySelector('.date-chip.active');
  if (firstChip) loadUpcomingForDate(firstChip.dataset.date);

  /* ── Favorites remove ── */
  document.querySelectorAll('.fav-remove').forEach(btn => {
    btn.addEventListener('click', async (e) => {
      e.stopPropagation();
      const card = btn.closest('.fav-card');
      const id = btn.dataset.id;
      card.style.opacity = '0.4';
      try {
        const res = await FTApi.removeFavorite(id);
        if (res.ok) {
          card.remove();
        } else {
          card.style.opacity = '1';
          showToast('제거에 실패했어요.');
        }
      } catch (_) {
        card.style.opacity = '1';
      }
    });
  });

  // load upcoming for first chip if present (already invoked above)

  /* ── Upcoming sessions: load & render for selected date ── */
  const upcomingList = document.querySelector('#upcoming > [role="list"]') || document.querySelector('#upcoming');
  async function loadUpcomingForDate(dateIso) {
    try {
      const day = (new Date(dateIso)).toISOString().slice(0,10);
      const res = await FTApi.request('/api/sessions?date=' + encodeURIComponent(day));
      if (res && res.ok && res.body && res.body.items) {
        const sessions = res.body.items;
        // enrich each session with user's goal (if any)
        const meId = document.getElementById('userAvatar')?.dataset.userId || null;
        await Promise.all(sessions.map(async (s) => {
          try{
            const gRes = await FTApi.getGoals(s.id);
            if (gRes && gRes.ok && Array.isArray(gRes.body)){
              const myGoal = gRes.body.find(g => String(g.userId) === String(meId));
              if (myGoal) s.goalText = myGoal.goalText || myGoal.resultText || '';
            }
          }catch(e){ /* ignore per-item goal load errors */ }
        }));
        // show only sessions that haven't fully ended (end time > now) in Upcoming
        const now = Date.now();
        const futureSessions = sessions.filter(s => { const starts = new Date(s.startsAt).getTime(); const ends = starts + ((s.durationMin||25) * 60000); return ends > now; });
        renderSessionCards(futureSessions);
      } else {
        upcomingList.innerHTML = '<div class="text-sm text-gray-500">예정된 세션을 불러오지 못했습니다.</div>';
      }
    } catch (e) {
      console.error(e);
      upcomingList.innerHTML = '<div class="text-sm text-gray-500">서버 오류</div>';
    }
  }

  let _renderedSessions = [];
  function renderSessionCards(sessions) {
    _renderedSessions = Array.isArray(sessions) ? sessions.slice() : [];
    if (!Array.isArray(sessions) || sessions.length === 0) {
      upcomingList.innerHTML = '<div class="text-sm text-gray-500">예정된 세션이 없습니다.</div>';
      return;
    }
    const list = document.createElement('div');
    sessions.forEach(s => {
      const starts = new Date(s.startsAt);
      const ends = new Date(starts.getTime() + (s.durationMin||25)*60000);
      const card = document.createElement('div');
      card.className = 'session-card bg-surface-container-lowest rounded-2xl p-5 space-y-3 mb-3';
      card.dataset.sessionId = s.id;
      card.innerHTML = `
        <div class="flex justify-between items-center">
          <div class="flex items-center gap-1.5">
            <span class="material-symbols-outlined text-[14px] text-on-surface-variant">calendar_today</span>
            <span class="session-start text-[12px] font-semibold text-on-surface-variant">${new Intl.DateTimeFormat('ko-KR',{dateStyle:'medium',timeStyle:'short'}).format(starts)}</span>
          </div>
          <div class="flex items-center gap-1.5">
            <span class="session-duration px-2.5 py-0.5 rounded-full text-[10px] font-bold" style="background:rgba(0,110,36,0.10); color:#006e24">${s.durationMin}분</span>
            <span class="session-status px-2.5 py-0.5 rounded-full text-[10px] font-bold" style="background:rgba(58,91,219,0.10); color:#1a40c2">예정</span>
          </div>
        </div>
        <div class="flex items-center gap-3">
          <div class="w-11 h-11 rounded-full overflow-hidden bg-surface-container-high flex-shrink-0"
               style="box-shadow:0 0 0 2px #fff,0 0 0 3.5px rgba(59,91,219,0.12)">
            <img src="${s.partnerAvatar||''}" class="w-full h-full object-cover partner-avatar" alt="파트너"/>
          </div>
          <div class="flex-1 min-w-0">
            <p class="partner-name text-[14px] font-bold text-on-surface">${s.partnerName||s.nickname||'파트너'}</p>
            <p class="text-[12px] text-on-surface-variant truncate">${s.notes||s.goalText||''}</p>
          </div>
          <div class="flex flex-col items-end gap-1.5">
            <div class="flex items-center gap-1.5">
              <button class="btn-cta join-session text-white text-[12px] font-bold px-4 py-2 rounded-xl" data-id="${s.id}">${s.partnerId ? '매칭 완료' : (String(document.getElementById('userAvatar')?.dataset.userId||'') === String(s.hostId) ? '세션 보기' : '참가')}</button>
              ${ (new Date(s.startsAt).getTime() > Date.now() && String(document.getElementById('userAvatar')?.dataset.userId||'') === String(s.hostId)) ? '<button class="cancel-session text-[11px] font-semibold px-3 py-1.5 rounded-xl transition-colors hover:bg-surface-container" style="color:#ba1a1a">취소</button>' : '' }
            </div>
            <div class="text-[11px] text-on-surface-variant session-timer" data-session-id="${s.id}"></div>
          </div>
        </div>
      `;
      list.appendChild(card);
    });
    upcomingList.innerHTML = '';
    upcomingList.appendChild(list);

    // wire join buttons
    document.querySelectorAll('.join-session').forEach(b => b.addEventListener('click', async (e) => {
      const id = b.dataset.id;
      try {
        const s = sessionsFindById(id);
        if (!s) { showToast('세션 정보를 불러오지 못했습니다.'); return; }
        const myId = String(document.getElementById('userAvatar')?.dataset.userId || '');
        const starts = new Date(s.startsAt).getTime();
        const durationMs = (Number(s.durationMin || 25) * 60 * 1000);
        const ends = starts + durationMs;
        const now = Date.now();
        const isHost = myId && myId === String(s.hostId);
        const isPartner = myId && myId === String(s.partnerId);
        const isFinished = now > ends;
        // host/partner or completed session: navigate directly, no join API needed
        if (isHost || isPartner || isFinished) {
          window.location.href = '/app/session.html?id=' + encodeURIComponent(id);
          return;
        }
        if (s.partnerId) { showToast('이미 매칭되었습니다.'); return; }
        const allowedFrom = starts - durationMs;
        if (now < allowedFrom) {
          alert('예약 시간과 불일치 합니다.');
          return;
        }
        const res = await FTApi.joinSession(id);
        if (res && res.ok) {
          // Try to prime autoplay permission using Web Audio API (user gesture)
          try {
            const AudioCtx = window.AudioContext || window.webkitAudioContext;
            if (AudioCtx) {
              const ctx = new AudioCtx();
              if (ctx.state === 'suspended') await ctx.resume();
              const o = ctx.createOscillator();
              const g = ctx.createGain();
              g.gain.value = 0;
              o.connect(g);
              g.connect(ctx.destination);
              o.start(0);
              o.stop(0);
            }
          } catch (err) { /* ignore */ }

          // navigate to session and request autoplay
          window.location.href = '/app/session.html?id=' + encodeURIComponent(id) + '&autoplay=1';
        } else if (res && res.status === 409) {
          showToast('이미 매칭되었습니다.');
        } else if (res && res.status === 400 && res.body && res.body.error === 'too_early') {
          alert(res.body.message || '예약 시간과 불일치 합니다.');
        } else {
          showToast('참가 실패');
        }
      } catch (err) { console.error(err); showToast('서버 오류'); }
    }));

    // set avatar fallbacks for partner avatars we just rendered
    document.querySelectorAll('.partner-avatar').forEach(img => {
      img.onerror = function(){ try{ const name = (img.closest('.session-card')?.querySelector('.partner-name')?.textContent||'P').trim(); this.onerror=null; this.src = placeholderAvatarDataUrl(name[0]); }catch(e){ this.src = placeholderAvatarDataUrl('P'); } };
    });

    // wire cancel buttons
    document.querySelectorAll('.cancel-session').forEach(btn => btn.addEventListener('click', async (e) => {
      const card = btn.closest('.session-card');
      const id = card && card.dataset ? card.dataset.sessionId : null;
      if (!id) return;
      if (!confirm('정말 이 예정된 세션을 취소하시겠습니까?')) return;
      try{
        const res = await FTApi.request('/api/sessions/' + encodeURIComponent(id), { method: 'DELETE' });
        if (res && res.ok){
          // remove from rendered sessions and rerender
          _renderedSessions = _renderedSessions.filter(x=> String(x.id) !== String(id));
          renderSessionCards(_renderedSessions);
          showToast('세션이 취소되었습니다.');
        } else if (res && res.status === 400 && res.body && res.body.error === 'too_late_to_cancel') {
          alert(res.body.message || '세션은 시작 15분 전까지만 취소 가능합니다.');
        } else if (res && res.status === 403) {
          alert('이 세션을 취소할 권한이 없습니다.');
        } else {
          showToast('취소에 실패했습니다.');
        }
      }catch(e){ console.error(e); showToast('서버 오류'); }
    }));

    // start timers
    startSessionTimer();
  }

  // timers
  let timerInterval = null;
  function startSessionTimer() {
    if (timerInterval) clearInterval(timerInterval);
    timerInterval = setInterval(() => {
      document.querySelectorAll('.session-card').forEach(card => {
        const id = card.dataset.sessionId;
        const statusEl = card.querySelector('.session-status');
        const timerEl = card.querySelector('.session-timer');
        const startText = card.querySelector('.session-start').textContent;
        const s = sessionsFindById(id);
        if (!s) return;
        const starts = new Date(s.startsAt);
        const ends = new Date(starts.getTime() + (s.durationMin||25)*60000);
        const now = new Date();
        if (now < starts) { statusEl.textContent = '예정'; if (timerEl) timerEl.textContent = '시작까지 ' + formatDuration(Math.floor((starts-now)/1000)); }
        else if (now >= starts && now < ends) { statusEl.textContent = '진행중'; if (timerEl) timerEl.textContent = '남은 시간 ' + formatDuration(Math.floor((ends-now)/1000)); }
        else { statusEl.textContent = '완료'; if (timerEl) timerEl.textContent = ''; }
      });
    }, 1000);
  }

  function sessionsFindById(id) { return _renderedSessions.find(s => String(s.id) === String(id)) || null; }

  function formatDuration(sec) { if (sec <= 0) return '0초'; const m = Math.floor(sec/60); const s = sec%60; return (m? m + '분 ':'') + s + '초'; }

  /* ── Nav active state and routing ── */
  document.querySelectorAll('.nav-item').forEach(item => {
    item.addEventListener('click', function(e) {
      e.preventDefault();
      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
      e.currentTarget.classList.add('active');
      const route = (e.currentTarget && e.currentTarget.dataset && e.currentTarget.dataset.route) ? e.currentTarget.dataset.route : null;
      if (!route) return;
      switch(route){
        case 'home': window.location.href = '/app/home_dashboard.html'; break;
        case 'explore': window.location.href = '/app/home.html'; break; // placeholder
        case 'history': window.location.href = '/app/history.html'; break;
        case 'profile': window.location.href = '/app/profile.html'; break;
      }
    });
  });
})();
</script>
</body>
