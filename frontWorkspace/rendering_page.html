<!DOCTYPE html>
<html lang="ko"><head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet"/>
<title>Rendering Page — FocusTime</title>
</head>
<body class="bg-background text-on-surface antialiased">
  <main class="max-w-5xl mx-auto px-6 py-12">
    <h1 class="text-3xl font-bold mb-6">UI 렌더링 가이드</h1>
    <p class="text-on-surface-variant mb-6">Stitch에서 생성된 컴포넌트 예시와 디자인 토큰을 확인하세요.</p>
    <div class="grid md:grid-cols-2 gap-6">
      <div class="bg-surface p-6 rounded-xl shadow">
        <h3 class="font-semibold mb-3">로그인 (예시)</h3>
        <img src="frontWorkspace/stitch_minimalist_indigo_ui_system/stitch_minimalist_indigo_ui_system_login/screen.png" alt="login screen" class="w-full rounded" />
      </div>
      <div class="bg-surface p-6 rounded-xl shadow">
        <h3 class="font-semibold mb-3">홈 (예시)</h3>
        <img src="frontWorkspace/stitch_minimalist_indigo_ui_system/stitch_minimalist_indigo_ui_system_home/screen.png" alt="home screen" class="w-full rounded" />
      </div>
    </div>
  </main>
</body>
</html>
