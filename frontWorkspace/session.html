<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet">
  <title>Session - FocusTime</title>
</head>
<body class="bg-background text-on-surface min-h-screen p-6">
  <main class="max-w-3xl mx-auto bg-white p-6 rounded-xl shadow">
    <h1 class="text-xl font-bold mb-4">세션</h1>
    <section class="mb-4">
      <div class="mb-2">메시지</div>
      <div id="messages" class="space-y-2 mb-3 max-h-48 overflow-auto"></div>
      <input id="msgInput" type="text" class="w-full p-2 border rounded" placeholder="메시지 입력..." />
      <button id="sendMsg" class="mt-2 px-3 py-1 bg-indigo-600 text-white rounded">전송</button>
    </section>

    <section class="mb-4">
      <div class="mb-2">목표 추가</div>
      <input id="goalInput" type="text" class="w-full p-2 border rounded mb-2" placeholder="오늘의 목표" />
      <button id="addGoal" class="px-3 py-1 bg-indigo-600 text-white rounded">추가</button>
      <div id="goals" class="mt-2 space-y-2"></div>
    </section>

    <section>
      <div class="mb-2">유튜브 URL</div>
      <input id="videoInput" type="text" class="w-full p-2 border rounded mb-2" placeholder="https://youtu.be/..." />
      <button id="saveVideo" class="px-3 py-1 bg-indigo-600 text-white rounded">저장</button>
      <div id="videoEmbed" class="mt-3"></div>
    </section>
  </main>

  <script src="/app/js/api.js"></script>
  <script>
    (function(){
      const sessionId = FTApi.getSessionId(); if(!sessionId){ alert('세션 없음'); window.location.href='/app/home.html'; }
      const messagesEl = document.getElementById('messages');
      const goalsEl = document.getElementById('goals');

      async function load(){
        const msgs = await FTApi.getMessages(sessionId);
        messagesEl.innerHTML=''; (msgs.body||[]).reverse().forEach(m=>{ const d=document.createElement('div'); d.textContent=m.body; d.className='p-2 bg-surface-container-lowest rounded'; messagesEl.appendChild(d); });
        const gs = await FTApi.getGoals(sessionId);
        goalsEl.innerHTML=''; (gs.body||[]).forEach(g=>{ const d=document.createElement('div'); d.textContent=g.goalText; d.className='p-2 bg-surface-container-lowest rounded'; goalsEl.appendChild(d); });
      }
      load();

      document.getElementById('sendMsg').addEventListener('click', async ()=>{
        const v = document.getElementById('msgInput').value.trim(); if(!v) return; const r=await FTApi.postMessage(sessionId,v); if(r.ok){ document.getElementById('msgInput').value=''; load(); }else alert('메시지 실패');
      });

      document.getElementById('addGoal').addEventListener('click', async ()=>{
        const v = document.getElementById('goalInput').value.trim(); if(!v) return; const r=await FTApi.postGoal(sessionId,v); if(r.ok){ document.getElementById('goalInput').value=''; load(); } else alert('목표 실패');
      });

      document.getElementById('saveVideo').addEventListener('click', async ()=>{
        const url = document.getElementById('videoInput').value.trim(); const id = FTApi.extractYouTubeId(url); if(!id){ alert('유효한 YouTube URL 아님'); return; }
        const r = await FTApi.postVideo(sessionId, url); if(r.ok){ document.getElementById('videoEmbed').innerHTML = `<iframe width="560" height="315" src="https://www.youtube.com/embed/${id}?autoplay=1&mute=1" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>`; } else alert('비디오 저장 실패');
      });
    })();
  </script>
</body>
</html>
