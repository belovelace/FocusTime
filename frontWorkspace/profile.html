<!doctype html><html lang="ko"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script><link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet"><title>Profile</title></head><body class="bg-background text-on-surface min-h-screen p-6"><main class="max-w-3xl mx-auto bg-white p-6 rounded-xl shadow"><h1 class="text-xl font-bold mb-3">프로필</h1><div id="profileInfo" class="mb-4">로딩중...</div><button id="logout" class="px-3 py-2 bg-gray-200 rounded">로그아웃</button></main><script src="/app/js/api.js"></script><script>(async function(){ try{ const res = await FTApi.request('/api/users/me'); if(res.ok && res.body){ const u=res.body; document.getElementById('profileInfo').innerHTML = `<div><strong>${u.nickname}</strong><div>${u.email}</div></div>`; } else { alert('프로필 로드 실패'); } }catch(e){ console.error(e); } document.getElementById('logout').addEventListener('click', ()=>{ FTApi.setToken(null); window.location.href='/app/login.html'; }); })();</script></body></html>
