<style>
  *, body { font-family: 'Pretendard', sans-serif; -webkit-font-smoothing: antialiased; }

  .material-symbols-outlined {
    font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    vertical-align: middle;
  }
  .icon-filled { font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24; }

  /* scrollbar hide */
  .no-scrollbar::-webkit-scrollbar { display: none; }
  .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

  /* CTA gradient button */
  .btn-primary {
    background: linear-gradient(135deg, #1a40c2 0%, #3b5bdb 100%);
    color: #fff;
    transition: opacity 150ms ease-in-out, transform 100ms ease-in-out;
  }
  .btn-primary:hover { opacity: 0.92; }
  .btn-primary:active { transform: scale(0.97); opacity: 0.88; }

  /* Settings row hover (no border) */
  .setting-row {
    transition: background 120ms ease-in-out;
  }
  .setting-row:hover { background: #f3f4f5; }
  .setting-row:active { background: #edeeef; }

  /* Partner card hover */
  .partner-card { transition: transform 150ms ease-in-out; }
  .partner-card:active { transform: scale(0.94); }

  /* Tag chip */
  .tag-chip { transition: background 120ms ease; }
  .tag-chip:hover { background: #dde1ff; }

  /* Stagger fade-up */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .fade-up   { animation: fadeUp 0.38s cubic-bezier(.22,1,.36,1) both; }
  .delay-1   { animation-delay: .05s; }
  .delay-2   { animation-delay: .10s; }
  .delay-3   { animation-delay: .16s; }
  .delay-4   { animation-delay: .22s; }
  .delay-5   { animation-delay: .28s; }

  /* Toast */
  #toast {
    position: fixed;
    bottom: 88px;
    left: 50%;
    transform: translateX(-50%) translateY(10px);
    background: #191c1d;
    color: #f0f1f2;
    padding: 9px 18px;
    border-radius: 9999px;
    font-size: 13px;
    font-weight: 500;
    opacity: 0;
    transition: opacity 180ms ease, transform 180ms ease;
    pointer-events: none;
    white-space: nowrap;
    z-index: 200;
  }
  #toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* Edit mode input */
  .edit-input {
    background: #edeeef;
    border: none;
    border-radius: 10px;
    padding: 11px 14px;
    font-size: 14px;
    width: 100%;
    transition: background 120ms ease, box-shadow 120ms ease;
    outline: none;
    color: #191c1d;
  }
  .edit-input:focus {
    background: #ffffff;
    box-shadow: 0 0 0 2px rgba(26,64,194,0.20);
  }

  /* Ambient shadow for floating cards */
  .ambient-card {
    box-shadow: 0 2px 20px rgba(25, 28, 29, 0.055);
  }

  /* Session status badge */
  .badge-open     { background: rgba(58,91,219,.10); color: #1a40c2; }
  .badge-matched  { background: rgba(0,110,36,.10);  color: #006e24; }
  .badge-active   { background: rgba(0,110,36,.18);  color: #005019; }
  .badge-done     { background: #edeeef;              color: #747686; }
  .badge-cancelled{ background: rgba(186,26,26,.08); color: #ba1a1a; }
</style>
</head>

          취소
        </button>
        <button id="saveBtn"
                class="btn-primary flex-1 py-3 rounded-xl text-sm font-bold">
          저장
        </button>
      </div>

    </div><!-- /editMode -->

  </main>

  <!-- recommend candidates fetch helper (adds Authorization header if code used fetch elsewhere) -->
  <script>
    (function(){
      // if a matching container exists, fetch candidates and render minimal cards
      async function loadMatching(){
        try{
          const container = document.getElementById('matchingCandidates');
          if(!container) return;
          // prefer FTApi (adds Authorization); fallback to direct fetch with token
          let res;
          if (typeof FTApi !== 'undefined') {
            res = await FTApi.request('/api/matching/candidates');
            if (res && res.ok) {
              renderCandidates(container, res.body.candidates || res.body || []);
              return;
            }
          }
          const token = localStorage.getItem('ft:token');
          const r = await fetch('/api/matching/candidates', { headers: { 'Authorization': token ? 'Bearer '+token : '' } });
          if (r.ok){ const j = await r.json(); renderCandidates(container, j.candidates || []); }
        }catch(e){ console.error('matching load failed', e); }
      }
      function renderCandidates(container, list){
        container.innerHTML = '';
        if(!Array.isArray(list) || list.length===0) { container.innerHTML = '<div class="text-sm text-gray-500">추천 파트너가 없습니다.</div>'; return; }
        list.slice(0,6).forEach(c=>{
          const d = document.createElement('div'); d.className='p-3 rounded-xl bg-white shadow mb-2';
          d.innerHTML = `<div class="flex items-center justify-between"><div><div class="font-bold">${c.nickname||c.userId}</div><div class="text-xs text-gray-600">점수 ${c.matchScore}</div></div><div>${c.isFavorite? '★':''}</div></div>`;
          container.appendChild(d);
        });
      }
      // fire on load
      document.addEventListener('DOMContentLoaded', loadMatching);
    })();
  </script>

  <!-- ── Bottom Nav ── -->
  <nav class="absolute bottom-0 left-0 right-0 z-50 flex justify-center items-center px-4 pb-6 pt-3 rounded-t-2xl"
       style="background:rgba(255,255,255,0.85);backdrop-filter:blur(20px);border-top:0.5px solid rgba(196,197,214,.2)">
    <div class="flex flex-col items-center px-4 py-1 rounded-xl" style="background:rgba(208,235,255,.7);color:#1a40c2">
      <span class="material-symbols-outlined icon-filled text-[22px]">person</span>
      <span class="text-[10px] font-semibold uppercase tracking-wider mt-0.5">프로필</span>
    </div>
  </nav>

</div><!-- /shell -->

<!-- Toast -->
<div id="toast" aria-live="polite"></div>

<script src="/app/js/api.js"></script>
<script>
(function () {
  /* ── Helpers ── */
  function showToast(msg, ms = 2500) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(t._timer);
    t._timer = setTimeout(() => t.classList.remove('show'), ms);
  }

  function statusLabel(s) {
    const map = { open: '모집 중', matched: '매칭 완료', active: '진행 중', done: '완료', cancelled: '취소됨' };
    return map[s] || s;
  }
  function statusClass(s) {
    return `badge-${s}`;
  }

  /* ── State ── */
  let currentUser = {};

  /* ── DOM refs ── */
  const viewMode      = document.getElementById('viewMode');
  const editModeEl    = document.getElementById('editMode');
  const editBtn       = document.getElementById('editBtn');
  const cancelEditBtn = document.getElementById('cancelEditBtn');
  const saveBtn       = document.getElementById('saveBtn');
  const avatarEl      = document.getElementById('avatar');
  const nameEl        = document.getElementById('displayName');
  const bioEl         = document.getElementById('displayBio');
  const tagsEl        = document.getElementById('interestTags');

  /* ── Render user data ── */
  function renderUser(u) {
    avatarEl.src = u.avatarUrl || '/app/assets/avatar-sample.svg';
    nameEl.textContent = u.nickname || (u.email || '').split('@')[0] || '사용자';
    bioEl.textContent  = u.bio || '';

    tagsEl.innerHTML = '';
    const tags = u.interests || u.tags || ['공부', '글쓰기', '코딩'];
    tags.slice(0, 8).forEach(t => {
      const b = document.createElement('span');
      b.className = 'tag-chip px-3 py-1 rounded-full text-primary text-xs font-semibold cursor-default';
      b.style.background = '#edf2ff';
      b.textContent = t;
      tagsEl.appendChild(b);
    });

    document.getElementById('statSessions').textContent = (u.completedSessions != null ? u.completedSessions + '회' : '—');
    document.getElementById('statTime').textContent     = u.totalFocused  || '—';
    document.getElementById('statWeek').textContent     = u.weekProgress  || '—';
  }

  /* ── Fetch & render ── */
  async function fetchAndRender() {
    try {
      if (typeof FTApi === 'undefined') return; // dev preview without api
      const res = await FTApi.request('/api/users/me');
      if (res.ok && res.body) {
        currentUser = res.body;
        renderUser(currentUser);
      }
    } catch (e) { console.error(e); }
  }

  /* ── Edit mode ── */
  function enterEdit() {
    viewMode.classList.add('hidden');
    editModeEl.classList.remove('hidden');
    editBtn.textContent = '';
    document.getElementById('nicknameInput').value  = currentUser.nickname  || '';
    document.getElementById('bioInput').value       = currentUser.bio       || '';
    document.getElementById('avatarUrlInput').value = currentUser.avatarUrl || '';
    document.getElementById('editAvatarPreview').src = currentUser.avatarUrl || avatarEl.src;
    document.getElementById('mainScroll').scrollTop = 0;
  }

  function exitEdit() {
    viewMode.classList.remove('hidden');
    editModeEl.classList.add('hidden');
    editBtn.textContent = '편집';
  }

  document.getElementById('avatarUrlInput').addEventListener('input', e => {
    const prev = document.getElementById('editAvatarPreview');
    prev.src = e.target.value.trim() || currentUser.avatarUrl || '/app/assets/avatar-sample.svg';
  });

  editBtn.addEventListener('click', enterEdit);
  cancelEditBtn.addEventListener('click', exitEdit);
  document.getElementById('avatarEditBtn').addEventListener('click', enterEdit);

  saveBtn.addEventListener('click', async () => {
    const payload = {
      nickname:  document.getElementById('nicknameInput').value.trim(),
      bio:       document.getElementById('bioInput').value.trim(),
      avatarUrl: document.getElementById('avatarUrlInput').value.trim() || null,
    };
    if (!payload.nickname) { showToast('닉네임을 입력해주세요'); return; }

    saveBtn.disabled = true;
    saveBtn.textContent = '저장 중…';
    try {
      if (typeof FTApi === 'undefined') {
        // dev preview: mock success
        currentUser = { ...currentUser, ...payload };
        renderUser(currentUser);
        exitEdit();
        showToast('저장되었습니다');
        return;
      }
      const r = await FTApi.request('/api/users/me', { method: 'PATCH', body: payload });
      if (r.ok) {
        currentUser = { ...currentUser, ...payload };
        renderUser(currentUser);
        exitEdit();
        showToast('저장되었습니다');
      } else {
        showToast('저장에 실패했습니다');
      }
    } catch (e) {
      console.error(e);
      showToast('서버 오류가 발생했습니다');
    } finally {
      saveBtn.disabled = false;
      saveBtn.textContent = '저장';
    }
  });

  /* ── Load upcoming sessions ── */
  async function loadMySessions() {
    const el = document.getElementById('mySessions');
    try {
      if (typeof FTApi === 'undefined') {
        el.innerHTML = '<div class="text-[13px] text-on-surface-variant">예정된 세션이 없습니다.</div>';
        return;
      }
      const res = await FTApi.request('/api/sessions?host=me&upcoming=1');
      if (res && res.ok && res.body && res.body.items && res.body.items.length) {
        el.innerHTML = '';
        res.body.items.forEach(s => {
          const dateStr = new Intl.DateTimeFormat('ko-KR', { dateStyle: 'short', timeStyle: 'short' }).format(new Date(s.startsAt));
          const row = document.createElement('div');
          row.className = 'bg-surface-container-lowest rounded-xl px-4 py-3.5 flex items-center justify-between ambient-card';
          row.innerHTML = `
            <div class="flex-1 min-w-0">
              <p class="text-[13px] font-semibold text-on-surface truncate">${dateStr}</p>
              <p class="text-[12px] text-on-surface-variant mt-0.5">${s.durationMin}분 · ${s.goalText || '목표 없음'}</p>
            </div>
            <div class="flex items-center gap-2 ml-3 flex-shrink-0">
              <span class="text-[10px] font-bold px-2 py-0.5 rounded-full ${statusClass(s.status)}">${statusLabel(s.status)}</span>
              <button class="view-session text-[12px] font-bold px-3 py-1.5 rounded-lg btn-primary" data-id="${s.id}">보기</button>
              <button class="cancel-my-session text-[12px] font-medium px-2 py-1.5 rounded-lg transition-colors hover:bg-surface-container text-on-surface-variant" data-id="${s.id}">취소</button>
            </div>
          `;
          el.appendChild(row);
        });

        el.querySelectorAll('.view-session').forEach(b => {
          b.addEventListener('click', e => {
            window.location.href = '/app/session.html?id=' + encodeURIComponent(e.currentTarget.dataset.id);
          });
        });
        el.querySelectorAll('.cancel-my-session').forEach(b => {
          b.addEventListener('click', async e => {
            if (!confirm('정말 이 세션을 취소하시겠습니까?')) return;
            const id = e.currentTarget.dataset.id;
            try {
              const r = await FTApi.request('/api/sessions/' + encodeURIComponent(id) + '/status', {
                method: 'PATCH', body: { status: 'cancelled' }
              });
              if (r && r.ok) {
                showToast('세션이 취소되었습니다.');
                loadMySessions();
              } else if (r && r.body && r.body.message) {
                // surface server-provided message when available
                alert(r.body.message);
              } else {
                showToast('취소 실패');
              }
            } catch (err) { console.error(err); showToast('서버 오류'); }
          });
        });
      } else {
        el.innerHTML = '<div class="text-[13px] text-on-surface-variant py-1">예정된 세션이 없습니다.</div>';
      }
    } catch (e) {
      console.error(e);
      el.innerHTML = '<div class="text-[13px] text-on-surface-variant py-1">불러오기 실패</div>';
    }
  }

  /* ── Back button ── */
  document.getElementById('profileBack').addEventListener('click', () => {
    if (history.length > 1) { history.back(); return; }
    try {
      if (document.referrer && new URL(document.referrer).origin === location.origin) {
        window.location.href = document.referrer; return;
      }
    } catch (_) {}
    window.location.href = '/app/home_dashboard.html';
  });

  /* ── Logout ── */
  document.getElementById('logout').addEventListener('click', () => {
    if (typeof FTApi !== 'undefined') FTApi.setToken(null);
    window.location.href = '/app/login.html';
  });

  /* ── Settings rows ── */
  document.querySelectorAll('[data-action]').forEach(btn => {
    btn.addEventListener('click', () => {
      const action = btn.dataset.action;
      const routes = {
        notifications: '/app/settings/notifications.html',
        prefs:         '/app/settings/prefs.html',
        subscription:  '/app/subscription.html',
        privacy:       '/app/privacy.html',
      };
      if (routes[action]) window.location.href = routes[action];
    });
  });

  /* ── ?edit=1 auto-enter edit mode ── */
  const params = new URLSearchParams(location.search);
  if (params.get('edit') === '1') {
    fetchAndRender().then(enterEdit);
  } else {
    fetchAndRender();
  }
  loadMySessions();
})();
</script>
</body>
</html>
