<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>개인정보처리방침 — FocusTime</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
</head>
<body class="bg-background text-on-surface min-h-screen">
  <main class="max-w-4xl mx-auto p-6">
    <h1 class="text-2xl font-bold mb-4">개인정보처리방침</h1>
    <div id="content">로딩 중...</div>
  </main>
  <script>
    (async function(){
      try{
        const res = await fetch('/api/privacy');
        if (!res.ok) { document.getElementById('content').textContent = '불러오기 실패'; return; }
        const json = await res.json();
        document.getElementById('content').innerHTML = json.html || '정책 문서가 없습니다.';
      }catch(e){ document.getElementById('content').textContent = '서버 오류'; }
    })();
  </script>
</body>
</html>
