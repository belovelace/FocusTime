<script>
  (function(){
    // quick create session: find the CTA button and wire up a simple handler
    const btn = document.querySelector('button[aria-label="create-session"]') || document.querySelector('button:contains("세션 만들기")') || document.querySelector('button');
    if (btn) btn.addEventListener('click', async (e) => {
      e.preventDefault();
      // Default new session starts now, duration 25
      const startsAt = new Date().toISOString();
      const res = await FTApi.createSession({ startsAt, durationMin: 25, focusMode: 'any' });
      if (res.ok){ const id = res.body.id; FTApi.setSessionId(String(id)); window.location.href = '/app/stitch_minimalist_indigo_ui_system_session/code.html'; }
      else alert('세션 생성 실패');
    });
  })();
</script>
